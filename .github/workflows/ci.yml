name: CI

on:
  push:
  pull_request:

jobs:
  shell:
    name: Shell checks
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install shell tooling
        run: brew install shellcheck shfmt

      - name: Check Bash syntax
        run: bash -n update-all-mac.command

      - name: Run ShellCheck
        run: shellcheck -s bash update-all-mac.command

      - name: Check formatting with shfmt
        run: shfmt -i 4 -ci -bn -d update-all-mac.command

      - name: Check release documentation
        run: tests/release_docs_test.sh

      - name: Run behavior tests
        run: tests/uv_homebrew_only_test.sh

      - name: Run uv detection regression test
        run: tests/uv_homebrew_direct_detection_test.sh

      - name: Check Homebrew formula
        run: |
          ruby -c Formula/update-all-mac.rb
          brew tap mzored/update-all-mac "$GITHUB_WORKSPACE"
          brew audit --formula mzored/update-all-mac/update-all-mac
          brew install --build-from-source mzored/update-all-mac/update-all-mac
          brew test mzored/update-all-mac/update-all-mac
